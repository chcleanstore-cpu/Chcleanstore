<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CH Clean Store | متجر المنظفات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1e293b;
      direction: rtl;
      text-align: right;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --success: #2ecc71;
      --danger: #e74c3c;
      --warning: #f39c12;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 20px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 28px rgba(0,0,0,0.1);
      --radius-card: 20px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 1100;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-sm);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #1e293b, var(--primary)); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
    .logo img { height: 3.3rem; width: auto; margin-left: 8px; display: inline-block; vertical-align: middle; }
    .logo span { display: inline-block; vertical-align: middle; }
    .nav-icons i { font-size: 1.4rem; margin-right: 18px; cursor: pointer; color: #475569; transition: 0.2s; }
    .nav-icons i:hover { color: var(--primary); transform: scale(1.05); }
    #searchContainer { padding: 12px 20px; background: white; border-bottom: 1px solid var(--border); display: none; }
    #searchContainer.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    #searchInput { width: 100%; padding: 14px 20px; border-radius: 50px; border: 1px solid var(--border); background: #f8fafc; font-size: 1rem; font-family: inherit; outline: none; }
    #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
    .banner { width: 100%; margin: 0; padding: 0; }
    #coverImage { width: 100%; height: auto; max-height: 280px; object-fit: cover; display: block; }
    @media (min-width: 768px) { #coverImage { max-height: 400px; } }
    
    .categories-bar {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid var(--border);
      scrollbar-width: thin;
      align-items: center;
    }
    .categories-bar::-webkit-scrollbar { display: none; }
    .cat-btn {
      white-space: nowrap;
      padding: 8px 20px;
      border-radius: 40px;
      border: none;
      background: #f1f5f9;
      font-weight: 700;
      font-size: 0.85rem;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Cairo', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .cat-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .cat-btn.active { background: linear-gradient(135deg, var(--primary), #34d399); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
    .cat-btn .cat-count { background: rgba(255,255,255,0.2); padding: 0 8px; border-radius: 20px; font-size: 0.7rem; color: inherit; }
    .cat-btn.active .cat-count { background: rgba(255,255,255,0.3); }
    .cat-btn i { font-size: 0.8rem; }
    .cat-clear-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 40px;
      border: none;
      background: transparent;
      color: var(--danger);
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      display: none;
      transition: 0.2s;
      font-family: 'Cairo', sans-serif;
    }
    .cat-clear-btn.show { display: inline-flex; align-items: center; gap: 4px; }
    .cat-clear-btn:hover { background: #fef2f2; transform: scale(0.95); }

    .products-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      padding: 16px 20px;
    }
    @media (min-width: 640px) { .products-container { grid-template-columns: repeat(3,1fr); } }
    @media (min-width: 1024px) { .products-container { grid-template-columns: repeat(4,1fr); } }
    @media (min-width: 1400px) { .products-container { grid-template-columns: repeat(5,1fr); } }

    .product-card {
      background: var(--card);
      border-radius: var(--radius-card);
      overflow: hidden;
      transition: 0.25s ease;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      position: relative;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      cursor: pointer;
      background: #f1f5f9;
      position: relative;
      z-index: 1;
    }
    .product-info { padding: 12px; }
    .product-info h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.4;
      height: 2.5rem;
      overflow: hidden;
    }
    .product-price {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .product-family-tag {
      font-size: 0.7rem;
      color: var(--muted);
      background: #f1f5f9;
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8fafc;
      padding: 6px;
      border-radius: 40px;
      gap: 4px;
    }
    .qty-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 30px;
      background: white;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    .qty-input {
      width: 55px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 8px 0;
      background: white;
    }

    /* ====== ستايل التخفيضات ====== */
    .product-card.on-sale {
      border: 3px solid #dc2626;
      background: #fff5f5;
      box-shadow: 0 0 20px rgba(220,38,38,0.15);
    }
    .product-card.on-sale .product-price {
      color: #dc2626;
      font-size: 1.3rem;
    }
    .product-card.on-sale .old-price {
      text-decoration: line-through;
      color: #9ca3af;
      font-size: 0.8rem;
      margin-left: 6px;
    }
    .sale-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #dc2626;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  box-shadow: 0 2px 8px rgba(220, 38, 38, 0.4);
  z-index: 10;
  border: 2px solid rgba(255, 255, 255, 0.3);
}
    .sale-badge i { font-size: 10px; }
    .discount-timer {
      font-size: 11px;
      color: #dc2626;
      font-weight: 600;
      margin-top: 4px;
      background: #fee2e2;
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-block;
      direction: ltr;
    }
    .discount-timer.unlimited {
      background: #dbeafe;
      color: #2563eb;
    }
    .discount-timer i {
      margin-left: 4px;
    }

    /* ====== شريط PROMO المائل ====== */
    .product-image-wrapper {
  position: relative;
  width: 100%;
  overflow: hidden;
}

.promo-ribbon {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  transform: none;
  background: rgba(220, 38, 38, 0.35);
  color: #ffdd00;
  padding: 5px 0;
  text-align: center;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 15;
  pointer-events: none;
  border: none;
  white-space: nowrap;
  backdrop-filter: blur(2px);
}
.promo-ribbon.orange {
  background: rgba(230, 126, 34, 0.35);
}
    .promo-ribbon.orange {
      background: #e67e22; /* برتقالي */
    }

    #cartBtn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 30px;
      background: linear-gradient(135deg, var(--primary), #34d399);
      border: none;
      color: white;
      font-size: 1.6rem;
      box-shadow: 0 8px 22px rgba(16,185,129,0.4);
      cursor: pointer;
      z-index: 1050;
      transition: 0.2s;
    }
    #cartBtn:hover { transform: scale(1.05); }
    #cartBadge {
      position: absolute;
      top: -5px;
      left: -5px;
      background: var(--danger);
      color: white;
      border-radius: 30px;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 32px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-control {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-family: inherit;
    }
    .btn-order {
      background: linear-gradient(135deg, var(--primary), #34d399);
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    #cartItemsList { max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
    #cartItemsList .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      align-items: center;
    }
    #pagination { text-align: center; margin: 20px 0; }
    #pagination button {
      min-width: 38px;
      height: 38px;
      border: none;
      border-radius: 10px;
      margin: 4px;
      background: white;
      color: #333;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: 0.2s;
    }
    #pagination button:hover { transform: translateY(-2px); background: var(--primary); color: white; }
    #pagination .active-page { background: var(--primary); color: white; }
    footer {
      text-align: center;
      padding: 24px;
      background: white;
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--primary); text-decoration: none; }
    .whatsapp-btn {
      background: linear-gradient(135deg, #25D366, #128C7E) !important;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 16px;
    }
    .whatsapp-btn i { font-size: 22px; }
    .location-btn {
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      white-space: nowrap;
      transition: 0.2s;
    }
    .location-btn:hover { opacity: 0.9; transform: scale(0.98); }
    .location-btn i { font-size: 16px; }
    .location-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .address-container { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
    .address-container input { flex: 3; margin-bottom: 0; }
    @media (max-width: 550px) {
      .address-container { flex-direction: column; }
      .address-container input { width: 100%; margin-bottom: 10px; }
      .location-btn { width: 100%; justify-content: center; }
    }
    .clear-cart-btn {
      width: 100%;
      margin-top: 8px;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
    }
    .no-data {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .no-data i { font-size: 40px; display: block; margin-bottom: 12px; color: #d1d5db; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="https://i.postimg.cc/DwcBKXC4/1000021552-removebg-preview.png" alt="Logo">
    <span>CH Clean Store</span>
  </div>
  <div class="nav-icons">
    <i class="fa-solid fa-magnifying-glass" onclick="toggleSearch()"></i>
  </div>
</header>

<div id="searchContainer">
  <input type="text" id="searchInput" placeholder="ابحث باسم المنتج أو الرمز...">
</div>

<div class="banner">
  <img id="coverImage" src="" alt="غلاف المتجر">
</div>

<div class="categories-bar" id="categoriesBar">
  <button class="cat-btn active" data-family="الكل" id="filterAllBtn" onclick="setFamily('الكل')">
    <i class="fas fa-th-list"></i> الكل
    <span class="cat-count" id="countAll">0</span>
  </button>
  <button class="cat-btn" data-family="discounts" id="filterDiscountsBtn" onclick="setFamily('discounts')">
  <i class="fas fa-tags"></i> التخفيضات
  <span class="cat-count" id="countDiscounts">0</span>
</button>
  <button class="cat-clear-btn" id="clearFilterBtn" onclick="clearFamilyFilter()">
    <i class="fas fa-times-circle"></i> إلغاء التصفية
  </button>
</div>

<div class="products-container" id="productsContainer"></div>
<div id="pagination"></div>

<button id="cartBtn" onclick="openCart()">
  <i class="fa-solid fa-cart-shopping"></i>
  <span id="cartBadge" style="display: none;">0</span>
</button>

<!-- Cart Modal -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <h3 style="text-align:center;">🛒 سلة التسوق</h3>
    <div id="cartItemsList"></div>
    <div id="cartTotal" style="font-weight:800; text-align:center; margin:10px 0;"></div>
    <input type="text" id="custName" class="form-control" placeholder="الاسم الكامل">
    <input type="tel" id="custPhone" class="form-control" placeholder="رقم الهاتف">
    <div class="address-container">
      <input type="text" id="custAddress" class="form-control" placeholder="العنوان (المدينة، المنطقة، ...)">
      <button type="button" id="locationBtn" class="location-btn">
        <i class="fab fa-google"></i> <i class="fas fa-map-marker-alt"></i> تحديد الموقع
      </button>
    </div>
    <button class="btn-order whatsapp-btn" id="sendBtn" onclick="submitOrder()">
      <i class="fab fa-whatsapp" style="margin-left: 8px; font-size: 20px;"></i>
      إرسال الطلب عبر واتساب
    </button>
    <button style="width:100%; background:none; border:none; color:var(--danger); margin-top:12px;" onclick="closeModal('cartModal')">إغلاق</button>
  </div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="modal" onclick="closeModal('imageModal')">
  <img id="modalImg" style="max-width:95%; max-height:80%; border-radius:20px;">
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, onValue, get, push, set, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAe1ZmzSkemgaCoqRtKc0Yjn85F36obpsA",
    authDomain: "chcleanstore-596af.firebaseapp.com",
    databaseURL: "https://chcleanstore-596af-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "chcleanstore-596af",
    storageBucket: "chcleanstore-596af.firebasestorage.app",
    messagingSenderId: "198046127297",
    appId: "1:198046127297:web:d54d64a66e1ae315337040",
    measurementId: "G-XKN3FQ46XY"
  };

  const app = initializeApp(firebaseConfig);
  // ====== تفعيل الدخول المجهول ======
const auth = getAuth(app);
signInAnonymously(auth)
  .then(() => {
    console.log("✅ تم الدخول المجهول بنجاح (المتجر)");
  })
  .catch((error) => {
    console.warn("⚠️ فشل الدخول المجهول، لكن الموقع سيستمر في العمل للقراءة فقط:", error);
  });
window.auth = auth;
  const db = getDatabase(app);
  const WHATSAPP_NUMBER = "2130775980735";

  // ============================================================
  // بيانات التخفيضات والمنتجات والعائلات
  // ============================================================
  let allProducts = [];
  let allDiscounts = {};
  let familiesList = [];
  let currentFamilyFilter = 'الكل';
  let cart = JSON.parse(localStorage.getItem('cart_store')) || [];
  let currentPage = 1;
  const itemsPerPage = 20;
  let searchTerm = '';

  // ============================================================
  // تحميل البيانات من Firebase
  // ============================================================
  onValue(ref(db, 'products'), (snapshot) => {
    const data = snapshot.val() || {};
    allProducts = Object.entries(data)
      .map(([id, p]) => ({ id, ...p }))
      .filter(p => !p.hidden);
    updateFamilyCounts();
    applyFiltersAndRender();
  });

  onValue(ref(db, 'discounts'), (snapshot) => {
    const data = snapshot.val() || {};
    // إلغاء تنشيط التخفيضات المنتهية تلقائياً
    const now = Date.now();
    Object.entries(data).forEach(([productId, discount]) => {
      if (discount.isActive && !discount.unlimited && discount.endDate) {
        if (new Date(discount.endDate).getTime() < now) {
          // تحديث في قاعدة البيانات (سيتم تطبيقه فوراً)
          const refPath = ref(db, `discounts/${productId}`);
          update(refPath, { isActive: false }).catch(console.error);
          delete data[productId]; // إزالة من الكائن المحلي
        }
      }
    });
    allDiscounts = data;
    applyFiltersAndRender();
    startCountdownTimers();
  });

  // تحميل العائلات
  onValue(ref(db, 'families'), (snap) => {
    const data = snap.val();
    if (data) {
      familiesList = Object.values(data).map(item => {
        return typeof item === 'string' ? item : item.name || item;
      });
    } else {
      familiesList = [];
    }
    renderCategoryButtons();
    updateFamilyCounts();
  });

  // تحميل الغلاف
  onValue(ref(db, 'store/cover'), (snap) => {
    const img = document.getElementById('coverImage');
    if (snap.exists() && snap.val().url) img.src = snap.val().url;
  });

  // ============================================================
  // دوال العائلات والفلترة
  // ============================================================
  function renderCategoryButtons() {
  const bar = document.getElementById('categoriesBar');
  const existingBtns = bar.querySelectorAll('.cat-btn:not(#filterAllBtn):not(#filterDiscountsBtn)');
  existingBtns.forEach(btn => btn.remove());
  
  // إضافة أزرار العائلات
  familiesList.forEach(family => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.family = family;
    btn.innerHTML = `
      <i class="fas fa-tag"></i> ${escapeHtml(family)}
      <span class="cat-count" id="count_${escapeHtml(family)}">0</span>
    `;
    btn.addEventListener('click', () => setFamily(family));
    bar.insertBefore(btn, document.getElementById('clearFilterBtn'));
  });
  
  updateActiveCategory();
}

  function updateActiveCategory() {
  document.querySelectorAll('.cat-btn').forEach(btn => {
    const family = btn.dataset.family;
    btn.classList.toggle('active', family === currentFamilyFilter);
  });
  
  const clearBtn = document.getElementById('clearFilterBtn');
  if (currentFamilyFilter !== 'الكل' && currentFamilyFilter !== 'discounts') {
    clearBtn.classList.add('show');
    clearBtn.innerHTML = `<i class="fas fa-times-circle"></i> ✕ ${escapeHtml(currentFamilyFilter)}`;
  } else if (currentFamilyFilter === 'discounts') {
    clearBtn.classList.add('show');
    clearBtn.innerHTML = `<i class="fas fa-times-circle"></i> ✕ التخفيضات`;
  } else {
    clearBtn.classList.remove('show');
  }
}

  function updateFamilyCounts() {
  const totalProducts = allProducts.filter(p => !p.hidden).length;
  const countAll = document.getElementById('countAll');
  if (countAll) countAll.textContent = totalProducts;
  
  // حساب عدد المنتجات المخفضة
  const discountCount = allProducts.filter(p => {
    if (p.hidden) return false;
    const discount = allDiscounts[p.id];
    return discount && discount.isActive &&
      (discount.unlimited || (discount.endDate && new Date(discount.endDate).getTime() > Date.now()));
  }).length;
  const countDiscounts = document.getElementById('countDiscounts');
  if (countDiscounts) countDiscounts.textContent = discountCount;
  
  // حساب عدد كل عائلة
  familiesList.forEach(family => {
    const count = allProducts.filter(p => !p.hidden && p.family === family).length;
    const countEl = document.getElementById(`count_${escapeHtml(family)}`);
    if (countEl) countEl.textContent = count;
  });
}

  window.setFamily = (family) => {
    currentFamilyFilter = family;
    updateActiveCategory();
    applyFiltersAndRender();
  };

  window.clearFamilyFilter = () => {
    currentFamilyFilter = 'الكل';
    updateActiveCategory();
    applyFiltersAndRender();
  };

  function applyFiltersAndRender() {
  let filtered = allProducts.filter(p => !p.hidden);
  
  // فلترة حسب العائلة
  if (currentFamilyFilter === 'discounts') {
    // عرض المنتجات التي عليها تخفيض نشط فقط
    filtered = filtered.filter(p => {
      const discount = allDiscounts[p.id];
      return discount && discount.isActive &&
        (discount.unlimited || (discount.endDate && new Date(discount.endDate).getTime() > Date.now()));
    });
  } else if (currentFamilyFilter !== 'الكل') {
    filtered = filtered.filter(p => p.family === currentFamilyFilter);
  }
  
  // فلترة حسب البحث
  if (searchTerm.trim()) {
    const term = searchTerm.toLowerCase().trim();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(term) ||
      (p.serial && p.serial.toLowerCase().includes(term))
    );
  }
  
  renderProducts(filtered);
  updateFamilyCounts();
}

  // ============================================================
  // عرض المنتجات مع التخفيضات
  // ============================================================
  function renderProducts(filteredProducts) {
    const container = document.getElementById('productsContainer');
    container.innerHTML = '';

    const start = (currentPage - 1) * itemsPerPage;
    const paginated = filteredProducts.slice(start, start + itemsPerPage);

    if (paginated.length === 0) {
      container.innerHTML = `<div class="no-data"><i class="fas fa-box-open"></i> لا توجد منتجات</div>`;
      renderPagination(0);
      return;
    }

    paginated.forEach(p => {
      const discount = allDiscounts[p.id];
      const isOnSale = discount && discount.isActive && 
        (discount.unlimited || (discount.endDate && new Date(discount.endDate).getTime() > Date.now()));

      const inCart = cart.find(i => i.id === p.id);
      const qty = inCart ? inCart.quantity : 0;
      const originalPrice = Number(p.price) || 0;
      const salePrice = isOnSale ? Number(discount.newPrice) : originalPrice;
      const formattedSalePrice = salePrice.toLocaleString();
      const formattedOriginal = originalPrice.toLocaleString();

      const card = document.createElement('div');
      card.className = 'product-card';
      if (isOnSale) card.classList.add('on-sale');

      // شريط PROMO المائل
      let ribbonHtml = '';
      if (isOnSale) {
        const ribbonColor = discount.unlimited ? 'orange' : '';
        ribbonHtml = `<div class="promo-ribbon ${ribbonColor}">PROMO </div>`;
      }

      // شارة التخفيض (بجانب الصورة)
      let badgeHtml = '';
      if (isOnSale) {
        badgeHtml = discount.unlimited ?
  `<div class="sale-badge" style="background:#2563eb;"><i class="fas fa-infinity"></i></div>` :
  `<div class="sale-badge"><i class="fas fa-percent"></i></div>`;
      }

      // العد التنازلي
      let timerHtml = '';
      if (isOnSale && !discount.unlimited && discount.endDate) {
        timerHtml = `<div class="discount-timer" id="timer_${p.id}" data-end="${discount.endDate}" data-productid="${p.id}"><i class="far fa-clock"></i> <span class="time-left">جاري...</span></div>`;
      } else if (isOnSale && discount.unlimited) {
        timerHtml = `<div class="discount-timer unlimited"><i class="fas fa-infinity"></i> تخفيض دائم</div>`;
      }

      // بناء البطاقة
      card.innerHTML = `
  <div class="product-image-wrapper">
    <img src="${p.imageUrl || 'https://via.placeholder.com/150'}" onclick="viewImage('${p.imageUrl || ''}')" loading="lazy">
    ${ribbonHtml}
  </div>
  <div class="product-info">
    <h3>${escapeHtml(p.name)}</h3>
    <div class="product-price">
      ${isOnSale ? `<span class="old-price">${formattedOriginal} دج</span>` : ''}
      ${formattedSalePrice} دج
    </div>
    <div class="product-family-tag">🏷️ ${p.family || 'غير مصنف'}</div>
    ${timerHtml}
    <div class="qty-controls">
      <button class="qty-btn" onclick="updateQty('${p.id}', -1)">-</button>
      <input type="number" class="qty-input" value="${qty}" min="0" onchange="manualQty('${p.id}', this.value)">
      <button class="qty-btn" onclick="updateQty('${p.id}', 1)">+</button>
    </div>
  </div>
`;
      container.appendChild(card);
    });

    updateCartBadge();
    renderPagination(filteredProducts.length);
  }

  // ============================================================
  // العد التنازلي (تحديث كل ثانية)
  // ============================================================
  function updateTimer(el) {
    const endDate = new Date(el.dataset.end);
    const now = new Date();
    const diff = endDate.getTime() - now.getTime();
    const timeSpan = el.querySelector('.time-left');
    if (!timeSpan) return;

    if (diff <= 0) {
      timeSpan.textContent = 'انتهى!';
      el.style.background = '#e5e7eb';
      el.style.color = '#6b7280';
      // إلغاء تنشيط التخفيض في Firebase
      const productId = el.dataset.productid;
      if (productId && allDiscounts[productId] && allDiscounts[productId].isActive) {
        const refPath = ref(db, `discounts/${productId}`);
        update(refPath, { isActive: false }).catch(console.error);
      }
      return;
    }
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
    const secs = Math.floor((diff % (1000*60)) / 1000);
    let str = '';
    if (days > 0) str += `${days}يوم `;
    str += `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    timeSpan.textContent = str;
  }

  function startCountdownTimers() {
    setInterval(() => {
      document.querySelectorAll('.discount-timer[data-end]').forEach(el => updateTimer(el));
    }, 1000);
    // تحديث فوري للمؤقتات الموجودة
    setTimeout(() => {
      document.querySelectorAll('.discount-timer[data-end]').forEach(el => updateTimer(el));
    }, 100);
  }

  // ============================================================
  // دوال السلة
  // ============================================================
  window.updateQty = (id, change) => {
    const p = allProducts.find(x => x.id === id);
    const idx = cart.findIndex(x => x.id === id);
    const price = Number(p.price) || 0;
    if (idx > -1) {
      cart[idx].quantity += change;
      if (cart[idx].quantity <= 0) cart.splice(idx, 1);
    } else if (change > 0) {
      cart.push({ id: p.id, name: p.name, price: price, serial: p.serial || "---", quantity: 1 });
    }
    localStorage.setItem('cart_store', JSON.stringify(cart));
    applyFiltersAndRender();
  };

  window.manualQty = (id, val) => {
    const p = allProducts.find(x => x.id === id);
    const quantity = parseInt(val) || 0;
    const price = Number(p.price) || 0;
    const idx = cart.findIndex(x => x.id === id);
    if (quantity > 0) {
      if (idx > -1) cart[idx].quantity = quantity;
      else cart.push({ id: p.id, name: p.name, price: price, serial: p.serial || "---", quantity });
    } else {
      if (idx > -1) cart.splice(idx, 1);
    }
    localStorage.setItem('cart_store', JSON.stringify(cart));
    applyFiltersAndRender();
  };

  window.updateCartBadge = () => {
    const badge = document.getElementById('cartBadge');
    const count = cart.reduce((a, b) => a + b.quantity, 0);
    badge.innerText = count;
    badge.style.display = count > 0 ? 'inline-block' : 'none';
  };

  window.openCart = () => {
    const list = document.getElementById('cartItemsList');
    list.innerHTML = '';
    let total = 0;
    if (cart.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:var(--muted); padding:20px;">السلة فارغة</div>';
    } else {
      cart.forEach(item => {
        total += item.price * item.quantity;
        list.innerHTML += `
          <div class="cart-item">
            <span>${escapeHtml(item.name)} (x${item.quantity})</span>
            <span>${(item.price * item.quantity).toLocaleString()} دج</span>
          </div>
        `;
      });
      list.innerHTML += `<button class="clear-cart-btn" onclick="clearCart()">🗑️ مسح السلة</button>`;
    }
    document.getElementById('cartTotal').innerText = `المجموع: ${total.toLocaleString()} دج`;
    document.getElementById('cartModal').style.display = 'flex';
  };

  window.clearCart = () => { cart = []; localStorage.removeItem('cart_store'); applyFiltersAndRender(); closeModal('cartModal'); };

  // ============================================================
  // تحديد الموقع
  // ============================================================
  document.getElementById("locationBtn")?.addEventListener("click", () => {
    if (!navigator.geolocation) {
      alert("❌ متصفحك لا يدعم خاصية تحديد الموقع");
      return;
    }
    const btn = document.getElementById("locationBtn");
    const originalText = btn.innerHTML;
    const addressInput = document.getElementById("custAddress");
    const existingAddress = addressInput.value.trim();
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحميل...';
    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const mapsUrl = `https://maps.google.com/?q=${lat},${lng}`;
        if (existingAddress) {
          if (existingAddress.includes("maps.google.com")) {
            alert("📍 رابط الموقع موجود مسبقاً");
          } else {
            addressInput.value = `${existingAddress} | ${mapsUrl}`;
            alert("✅ تم إضافة رابط الموقع بجانب العنوان");
          }
        } else {
          addressInput.value = mapsUrl;
          alert("✅ تم تحديد موقعك بنجاح");
        }
        btn.disabled = false;
        btn.innerHTML = originalText;
      },
      (error) => {
        btn.disabled = false;
        btn.innerHTML = originalText;
        let errorMsg = "❌ حدث خطأ";
        switch(error.code) {
          case error.PERMISSION_DENIED: errorMsg = "❌ الرجاء السماح بتحديد الموقع"; break;
          case error.POSITION_UNAVAILABLE: errorMsg = "❌ معلومات الموقع غير متوفرة"; break;
          case error.TIMEOUT: errorMsg = "❌ انتهى وقت المحاولة"; break;
        }
        alert(errorMsg);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  });

  // ============================================================
  // إرسال الطلب
  // ============================================================
  function generateWhatsAppMessage(name, phone, address, items, total) {
    const LTR_OVERRIDE = '\u202A';
    const POP_DIRECTIONAL = '\u202C';
    let itemsText = "";
    items.forEach((item) => {
      const itemTotal = item.price * item.quantity;
      itemsText += `${item.quantity} × ${item.name} × ${item.price.toLocaleString()} DA = ${itemTotal.toLocaleString()} DA\n`;
    });
    let mapsText = "";
    let addressText = "";
    if (address.includes("maps.google.com")) {
      mapsText = `Google maps : ${address}\n`;
      const addressPart = address.split('|')[0].trim();
      if (addressPart && addressPart !== "") addressText = `l'adresse : ${addressPart}\n`;
    } else if (address && address.trim() !== "") {
      addressText = `l'adresse : ${address}\n`;
    }
    return `${LTR_OVERRIDE}Nouvelle demande.\nDe: ${name}\nN°: de téléphone : ${phone}\n${addressText}${mapsText}\n${itemsText}\nTotal: ${total.toLocaleString()} DA\n📅 ${new Date().toLocaleString('fr-FR')}${POP_DIRECTIONAL}`;
  }

  async function saveOrderToFirebase(orderData) {
  try {
    // التأكد من أن المستخدم قد سجل دخوله (مجهول) قبل محاولة الكتابة
    if (!auth.currentUser) {
      console.warn("⏳ المستخدم ليس مسجلاً بعد، جاري تسجيل الدخول مجدداً...");
      await signInAnonymously(auth);
    }
    
    const ordersRef = ref(db, 'whatsappOrders');
    const newOrderRef = push(ordersRef);
    orderData.timestamp = Date.now();
    orderData.status = "pending";
    await set(newOrderRef, orderData);
    return true;
  } catch (e) {
    // عرض الخطأ التفصيلي في رسالة التنبيه لمعرفة السبب
    console.error("❌ خطأ في حفظ الطلب:", e);
    alert("❌ فشل حفظ الطلب في قاعدة البيانات:\n" + e.message);
    return false;
  }
}

  window.submitOrder = async () => {
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    const address = document.getElementById('custAddress').value.trim();
    if (!name || !phone || !address || cart.length === 0) {
      alert("يرجى ملء جميع البيانات وإضافة منتجات للسلة");
      return;
    }
    const total = cart.reduce((a, b) => a + (b.price * b.quantity), 0);
    const message = generateWhatsAppMessage(name, phone, address, cart, total);
    const encodedMessage = encodeURIComponent(message);
    const orderToSave = {
      customerName: name,
      phone: phone,
      address: address,
      items: [...cart],
      totalPrice: total
    };
    const saved = await saveOrderToFirebase(orderToSave);
    if (saved) {
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
      cart = [];
      localStorage.removeItem('cart_store');
      applyFiltersAndRender();
      document.getElementById('custName').value = '';
      document.getElementById('custPhone').value = '';
      document.getElementById('custAddress').value = '';
      alert("✅ تم إرسال الطلب إلى واتساب وحفظه في النظام");
      closeModal('cartModal');
    } else {
      alert("❌ حدث خطأ في حفظ الطلب، يرجى المحاولة مرة أخرى");
    }
  };

  // ============================================================
  // دوال عامة
  // ============================================================
  window.toggleSearch = () => document.getElementById('searchContainer').classList.toggle('active');
  window.viewImage = (url) => { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; };
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    currentPage = 1;
    applyFiltersAndRender();
  });

  function renderPagination(totalItems) {
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) return;
    const createBtn = (text, targetPage, active = false, disabled = false) => {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.style.cssText = `
        min-width: 38px;
        height: 38px;
        border: none;
        border-radius: 10px;
        margin: 4px;
        background: ${active ? "#10b981" : "#ffffff"};
        color: ${active ? "#ffffff" : "#333"};
        font-weight: 600;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        cursor: ${disabled ? "default" : "pointer"};
        opacity: ${disabled ? "0.5" : "1"};
      `;
      if (!disabled) btn.onclick = () => { currentPage = targetPage; applyFiltersAndRender(); window.scrollTo(0, 0); };
      pagination.appendChild(btn);
    };
    createBtn("‹", currentPage - 1, false, currentPage === 1);
    createBtn("1", 1, currentPage === 1);
    if (currentPage > 3) {
      const dots = document.createElement("span");
      dots.textContent = "...";
      dots.style.margin = "0 5px";
      pagination.appendChild(dots);
    }
    for (let i = Math.max(2, currentPage - 3); i <= Math.min(totalPages - 1, currentPage + 3); i++) {
      createBtn(i, i, currentPage === i);
    }
    if (currentPage < totalPages - 2) {
      const dots = document.createElement("span");
      dots.textContent = "...";
      dots.style.margin = "0 5px";
      pagination.appendChild(dots);
    }
    if (totalPages > 1) createBtn(totalPages, totalPages, currentPage === totalPages);
    createBtn("›", currentPage + 1, false, currentPage === totalPages);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
</script>
